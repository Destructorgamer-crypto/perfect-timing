<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rubik's Theory</title>
    <style>
        :root { --c-white: #fff; --c-red: #ff3e3e; --c-blue: #3e7bff; --c-orange: #ff9f3e; --c-green: #3eff5e; --c-yellow: #ffe63e; }
        
        body { 
            background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column;
        }

        /* Borde animado loop */
        .wrapper {
            position: relative; padding: 8px;
            background: linear-gradient(45deg, var(--c-white), var(--c-red), var(--c-blue), var(--c-orange), var(--c-green), var(--c-yellow), var(--c-white));
            background-size: 400% 400%;
            animation: gradientLoop 5s ease infinite;
            border-radius: 15px;
        }
        @keyframes gradientLoop { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { background: #050505; padding: 40px; border-radius: 8px; }

        /* Estructura de 3 zonas */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .zone { border: 1px solid #222; padding: 20px; text-align: center; }

        nav { padding: 20px; display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        nav button { background: none; border: none; color: #888; cursor: pointer; font-size: 1.2em; transition: 0.3s; }
        nav button:hover { color: #fff; }

        iframe { width: 100%; height: 200px; border: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="container">
        <header><h1>THE RUBIK'S THEORY</h1></header>

        <nav>
            <button onclick="alert('Funcionalidad de navegación')">Principiante</button>
            <button onclick="alert('Funcionalidad de navegación')">Intermedio</button>
            <button onclick="alert('Funcionalidad de navegación')">Avanzado</button>
        </nav>

        <div class="grid">
            <div class="zone">
                <h3>Zona 1: Conceptos</h3>
                <p>Base teórica del cubo.</p>
            </div>
            <div class="zone">
                <h3>Zona 2: Tutorial</h3>
                <iframe src="URL_JUEGO_O_VIDEO.embed"></iframe>
            </div>
            <div class="zone">
                <h3>Zona 3: Recursos</h3>
                <p>Enlaces a herramientas externas.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
