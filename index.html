<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialed Time</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --bg-color: #ffffff; 
            --card-bg: #000000; 
            --text-main: #ffffff;
            --text-muted: #808080;
            --prep-color-start: #ff7e5f; 
            --prep-color-end: #feb47b; 
            --run-color: #ffffff;
            --success-color: #22c55e;
            --fail-color: #ef4444;
            /* Colores modo difícil */
            --card-bg-hard: #1a0f0f;
            --prep-hard-start: #3b0764;
            --prep-hard-end: #831843;
            --run-hard-color: #fbcfe8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .game-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 680px;
            height: 620px;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem 3rem;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s ease, background-color 0.4s ease, border-color 0.4s ease;
            animation: cardFloat 4s ease-in-out infinite alternate;
        }

        body.mode-hard .game-card {
            background-color: var(--card-bg-hard);
            border-color: rgba(219, 39, 119, 0.3);
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .round-display {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* Toggle de Modo Difícil (Esquina superior izquierda dentro de la tarjeta negra) */
        .hard-mode-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .hard-mode-toggle:hover {
            color: #f472b6;
        }

        .toggle-switch {
            width: 38px;
            height: 20px;
            background: #333;
            border-radius: 20px;
            position: relative;
            transition: background 0.3s;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #808080;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s, background 0.3s;
        }

        body.mode-hard .toggle-switch {
            background: #be185d;
        }

        body.mode-hard .toggle-switch::before {
            transform: translateX(18px);
            background: #fbcfe8;
        }

        .target-display {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-main);
            transition: color 0.3s ease;
        }

        body.mode-hard .target-display {
            color: #fbcfe8;
        }

        .main-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            gap: 0.5rem;
        }

        .timer-val {
            font-size: 10rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            letter-spacing: -4px;
            color: var(--text-main);
            transition: all 0.3s ease;
            line-height: 0.9;
        }

        /* Preparación modo normal */
        body:not(.mode-hard).state-preparing .timer-val {
            background: linear-gradient(45deg, var(--prep-color-start), var(--prep-color-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseDegradado 1.5s ease-in-out infinite alternate, shakePrep 0.3s ease-in-out infinite alternate;
        }

        /* Preparación modo difícil */
        body.mode-hard.state-preparing .timer-val {
            background: linear-gradient(45deg, var(--prep-hard-start), var(--prep-hard-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseDegradado 1.5s ease-in-out infinite alternate, shakePrep 0.3s ease-in-out infinite alternate;
        }

        @keyframes pulseDegradado {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        body.state-running .timer-val {
            color: var(--run-color);
        }

        body.mode-hard.state-running .timer-val {
            color: var(--run-hard-color);
        }

        /* Ocultar el tiempo en modo difícil al correr */
        body.mode-hard.state-running .timer-val {
            font-size: 3rem;
            color: transparent;
        }

        .score-label {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-muted);
            text-align: center;
            min-height: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-val {
            font-size: 4.5rem;
            font-weight: 900;
            text-align: center;
            min-height: 85px;
            color: var(--text-main);
            transition: color 0.3s ease;
            line-height: 1;
            letter-spacing: -2px;
        }

        /* Resumen estilo dialed con animaciones elásticas */
        .summary-title {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            color: var(--text-main);
            animation: countUpIn 0.6s ease-out;
        }

        .summary-subtitle {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: 1rem;
            margin-bottom: 2rem;
            max-width: 400px;
            text-align: center;
            animation: fadeInMsg 0.6s ease-in;
        }

        .summary-box {
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 24px;
            padding: 1.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-main);
        }

        .rounds-grid {
            display: flex;
            gap: 4px;
            width: 100%;
            height: 75px;
            border-radius: 12px;
            overflow: hidden;
        }

        .round-box {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 8px;
            font-size: 1.25rem;
            font-weight: 900;
            position: relative;
            color: #fff;
            transform-origin: bottom;
            animation: fillGridChain 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        /* Cadena de apariciones elásticas (animación pantalla final) */
        .round-box:nth-child(1) { animation-delay: 0.1s; }
        .round-box:nth-child(2) { animation-delay: 0.2s; }
        .round-box:nth-child(3) { animation-delay: 0.3s; }
        .round-box:nth-child(4) { animation-delay: 0.4s; }
        .round-box:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fillGridChain {
            0% { transform: scaleY(0) scaleX(0.8); opacity: 0; }
            60% { transform: scaleY(1.08) scaleX(1); opacity: 1; }
            100% { transform: scaleY(1) scaleX(1); opacity: 1; }
        }

        .round-box::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        .round-box span {
            z-index: 2;
        }

        /* Colores dinámicos para las notas */
        .round-box.grade-poor { background-color: #591919; } 
        .round-box.grade-ok { background-color: #594419; } 
        .round-box.grade-good { background-color: #401959; } 
        .round-box.grade-great { background-color: #2b5919; } 
        .round-box.grade-perfect { background-color: #193659; } 

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }

        .instructions {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
            max-width: 450px;
            line-height: 1.4;
            transition: color 0.3s ease;
        }

        body.mode-hard .instructions {
            color: #fbcfe8;
        }

        .btn-reset {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            border: none;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        body.mode-hard .btn-reset {
            background: #fbcfe8;
            box-shadow: 0 0 15px rgba(219, 39, 119, 0.3);
        }

        body.mode-hard .btn-reset:hover {
            background: #fbcfe8;
            box-shadow: 0 0 25px rgba(219, 39, 119, 0.8);
        }

        .btn-reset:hover {
            transform: scale(1.15) rotate(180deg);
            background: #e0e0e0;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
        }

        .btn-reset svg {
            fill: #000000;
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        .btn-reset:hover svg {
            transform: scale(1.1);
        }

        /* Animaciones generales */
        .animate-pop {
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes shakePrep {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }

        .animate-shake {
            animation: shakeTotal 0.5s ease-in-out;
        }

        @keyframes shakeTotal {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .fade-in {
            animation: fadeInMsg 0.5s ease-in;
        }

        @keyframes fadeInMsg {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes spinPulse {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        .timer-tick-anim {
            animation: tickPulse 0.15s ease-out;
        }
        @keyframes tickPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="game-card" id="gameCard">
        <div class="card-top" id="cardTopNav">
            <div class="hard-mode-toggle" id="hardModeToggle">
                <span>Modo Difícil</span>
                <div class="toggle-switch" id="toggleSwitch"></div>
            </div>
            <div class="round-display">Ronda: <span id="roundVal">1</span>/5</div>
            <div class="target-display">Objetivo: <span id="targetVal">0.00</span>s</div>
        </div>

        <div class="main-display" id="mainDisplayArea">
            <div class="timer-val" id="timerVal">0.00</div>
            <div class="score-label" id="scoreLabel"></div>
            <div class="score-val" id="scoreVal"></div>
        </div>

        <div class="card-bottom" id="cardBottomNav">
            <div class="instructions" id="instructions">
                Mantén espacio para cargar. Suelta para iniciar el conteo, pulsa otra vez para parar.
            </div>
            <button class="btn-reset" id="nextBtn" aria-label="Siguiente">
                <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, duration, type = 'sine', ramp = true) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            if(ramp) {
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            } else {
                gain.gain.setValueAtTime(0.18, audioCtx.currentTime + duration - 0.05);
                gain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            }

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const GAME_STATES = {
            IDLE: 0,
            PREPARING: 1,
            RUNNING: 2,
            STOPPED: 3,
            SUMMARY: 4
        };

        let currentState = GAME_STATES.IDLE;
        let targetTime = 0.00;
        let timerStart = 0;
        let timerInterval = null;
        let elapsedTime = 0;
        let round = 1;
        let totalScore = 0;
        let chargeInterval = null;
        let chargePitch = 150;
        let roundScores = [];
        let isHardMode = false;

        const body = document.body;
        const gameCard = document.getElementById('gameCard');
        const targetVal = document.getElementById('targetVal');
        const roundVal = document.getElementById('roundVal');
        const timerVal = document.getElementById('timerVal');
        const scoreLabel = document.getElementById('scoreLabel');
        const scoreVal = document.getElementById('scoreVal');
        const instructions = document.getElementById('instructions');
        const nextBtn = document.getElementById('nextBtn');
        const cardTopNav = document.getElementById('cardTopNav');
        const mainDisplayArea = document.getElementById('mainDisplayArea');
        const cardBottomNav = document.getElementById('cardBottomNav');
        const hardModeToggle = document.getElementById('hardModeToggle');

        // Interruptor Modo Difícil
        hardModeToggle.addEventListener('click', () => {
            if (currentState === GAME_STATES.IDLE || currentState === GAME_STATES.SUMMARY) {
                isHardMode = !isHardMode;
                if (isHardMode) {
                    body.classList.add('mode-hard');
                } else {
                    body.classList.remove('mode-hard');
                }
                nextRound();
            }
        });

        function generateTarget() {
            // Tiempos más variados: random puro de 1.00s a 10.00s
            targetTime = Math.floor(Math.random() * 901 + 100) / 100;
            targetVal.textContent = targetTime.toFixed(2);
        }

        function getGradeClass(score) {
            if (score < 5) return 'grade-poor';
            if (score < 7) return 'grade-ok';
            if (score < 8.5) return 'grade-good';
            if (score < 9.5) return 'grade-great';
            return 'grade-perfect';
        }

        function getSummaryFlavorText(score) {
            if (score >= 45) return "¡Impecable! Eres una máquina del tiempo.";
            if (score >= 35) return "Increíblemente preciso. Tienes un control nato.";
            if (score >= 25) return "Buen resultado, pero aún puedes afinar más.";
            return "Sigue practicando, el tiempo es traicionero.";
        }

        function resetGameDisplay() {
            timerVal.textContent = "0.00";
            scoreLabel.textContent = "";
            scoreVal.textContent = "";
            body.className = isHardMode ? 'mode-hard' : '';
            scoreVal.className = 'score-val';
            instructions.className = 'instructions';
            gameCard.className = 'game-card';
            
            cardTopNav.style.display = "flex";
            mainDisplayArea.innerHTML = `
                <div class="timer-val" id="timerVal">0.00</div>
                <div class="score-label" id="scoreLabel"></div>
                <div class="score-val" id="scoreVal"></div>
            `;
            cardBottomNav.style.display = "flex";
            
            const recreatedTimerVal = document.getElementById('timerVal');
            const recreatedScoreLabel = document.getElementById('scoreLabel');
            const recreatedScoreVal = document.getElementById('scoreVal');
            return { recreatedTimerVal, recreatedScoreLabel, recreatedScoreVal };
        }

        function nextRound() {
            if (currentState === GAME_STATES.SUMMARY) {
                round = 1;
                totalScore = 0;
                roundScores = [];
            } else if (currentState !== GAME_STATES.STOPPED && currentState !== GAME_STATES.IDLE) {
                return;
            }
            
            const refs = resetGameDisplay();
            window.currTimerVal = refs.recreatedTimerVal;
            window.currScoreLabel = refs.recreatedScoreLabel;
            window.currScoreVal = refs.recreatedScoreVal;

            generateTarget();
            roundVal.textContent = round;
            currentState = GAME_STATES.IDLE;
            instructions.textContent = isHardMode 
                ? "Modo Difícil activado. ¡Suelta para iniciar y reza por tu ritmo interno!" 
                : "Mantén espacio para cargar. Suelta para iniciar.";
            gameCard.classList.add('animate-pop');
        }

        nextBtn.addEventListener('click', () => {
            if (currentState === GAME_STATES.SUMMARY) {
                nextRound();
            } else if (currentState === GAME_STATES.STOPPED || currentState === GAME_STATES.IDLE) {
                nextRound();
            }
        });

        generateTarget();
        window.currTimerVal = timerVal;
        window.currScoreLabel = scoreLabel;
        window.currScoreVal = scoreVal;

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                if (currentState === GAME_STATES.SUMMARY) return;

                if (currentState === GAME_STATES.IDLE) {
                    currentState = GAME_STATES.PREPARING;
                    body.className = (isHardMode ? 'mode-hard ' : '') + 'state-preparing';
                    instructions.textContent = "Cargando... Suelta para empezar.";
                    
                    chargePitch = 150;
                    chargeInterval = setInterval(() => {
                        if(chargePitch < 300) chargePitch += 10;
                        playTone(chargePitch, 0.1, 'sine', false);
                    }, 100);
                }
                else if (currentState === GAME_STATES.RUNNING) {
                    stopTimer();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                if (currentState === GAME_STATES.PREPARING) {
                    clearInterval(chargeInterval);
                    startTimer();
                }
            }
        });

        function startTimer() {
            currentState = GAME_STATES.RUNNING;
            body.className = (isHardMode ? 'mode-hard ' : '') + 'state-running';
            instructions.textContent = "Pulsa espacio otra vez para parar.";
            
            playTone(600, 0.15, 'triangle');

            timerStart = performance.now();
            timerInterval = setInterval(() => {
                let now = performance.now();
                elapsedTime = (now - timerStart) / 1000;
                
                if (!isHardMode) {
                    window.currTimerVal.textContent = elapsedTime.toFixed(2);
                } else {
                    window.currTimerVal.textContent = "-"; // Oculto en modo difícil
                }

                if (Math.floor(elapsedTime) > Math.floor(elapsedTime - 0.01)) {
                    playTone(400, 0.05, 'sine');
                    if (!isHardMode) {
                        window.currTimerVal.classList.add('timer-tick-anim');
                        setTimeout(() => window.currTimerVal.classList.remove('timer-tick-anim'), 150);
                    }
                }
            }, 10);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            currentState = GAME_STATES.STOPPED;
            body.className = isHardMode ? 'mode-hard' : '';

            let diff = Math.abs(elapsedTime - targetTime);
            let rawScore = 10 - (diff * 10);
            let finalScore = Math.max(0, rawScore);

            totalScore += finalScore;
            roundScores.push(finalScore);

            window.currTimerVal.textContent = elapsedTime.toFixed(2);
            window.currScoreLabel.textContent = `Nota Ronda ${round}`;
            window.currScoreVal.textContent = finalScore.toFixed(2) + " / 10.00";
            window.currScoreVal.classList.add('animate-pop');
            instructions.classList.add('fade-in');

            if (finalScore >= 8.00) {
                window.currScoreVal.style.color = 'var(--success-color)';
                playTone(880, 0.3, 'sine');
                instructions.textContent = "¡Increíble! Siguiente ronda...";
            } else {
                window.currScoreVal.style.color = 'var(--fail-color)';
                playTone(220, 0.3, 'sawtooth');
                gameCard.classList.add('animate-shake');
                setTimeout(() => gameCard.classList.remove('animate-shake'), 400);
                instructions.textContent = "Por poco... Siguiente ronda...";
            }

            setTimeout(() => {
                if (round < 5) {
                    round++;
                    nextRound();
                } else {
                    currentState = GAME_STATES.SUMMARY;
                    
                    cardTopNav.style.display = "none";
                    cardBottomNav.style.display = "flex"; 

                    let roundsHtml = roundScores.map((score, idx) => {
                        let gradeClass = getGradeClass(score);
                        return `
                            <div class="round-box ${gradeClass}">
                                <span>${score.toFixed(2)}</span>
                            </div>
                        `;
                    }).join('');

                    mainDisplayArea.innerHTML = `
                        <div class="summary-title">${totalScore.toFixed(2)}<span style="font-size: 2.5rem; font-weight: 900; color: var(--text-muted);">/50</span></div>
                        <div class="summary-subtitle">${getSummaryFlavorText(totalScore)}</div>
                        <div class="summary-box">
                            <div class="summary-header">
                                <span>Partida</span>
                                <span>${totalScore.toFixed(2)}/50</span>
                            </div>
                            <div class="rounds-grid">
                                ${roundsHtml}
                            </div>
                        </div>
                    `;

                    instructions.textContent = "Partida finalizada. Pulsa el botón para volver a jugar.";
                    nextBtn.innerHTML = '<svg viewBox="0 0 24 24" style="animation: spinPulse 6s linear infinite;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>';

                    playTone(1000, 0.2, 'sine');
                    setTimeout(() => playTone(1200, 0.3, 'sine'), 200);
                }
            }, 3000);
        }
    </script>
</body>
</html>
